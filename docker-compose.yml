services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: velvic
      POSTGRES_PASSWORD: velvic
      POSTGRES_DB: velvic
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U velvic"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload
    environment:
      ENV: local
      DATABASE_URL: postgresql+asyncpg://velvic:velvic@db:5432/velvic
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev-only-not-for-production
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }

  worker:
    build: ./backend
    command: celery -A app.pipeline.celery_app worker --beat --loglevel=info --concurrency=2
    environment:
      ENV: local
      DATABASE_URL: postgresql+asyncpg://velvic:velvic@db:5432/velvic
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app

volumes:
  db_data:
