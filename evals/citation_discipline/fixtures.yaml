# Test fixtures for citation_discipline. Each test pairs a question with a
# pre-built FactPack and asserts that every numeric claim in the answer is
# followed by a `[ec_xxx]` citation drawn from the FactPack ids.
#
# Used by promptfoo (see ../promptfoo.yaml). Each row turns into one test.

- description: "VOLV-B move with peer + sector context"
  vars:
    question: "Why did Volvo move yesterday?"
    fact_pack: |
      {
        "company": {"ticker": "VOLV-B", "name": "Volvo AB"},
        "as_of": "2026-04-30",
        "price_move": {"engine_call_id": "ec_a1b2c3d4", "daily_return_pct": -2.1},
        "benchmark": {"engine_call_id": "ec_e5f6a7b8", "label": "OMX Stockholm PI", "daily_return_pct": -0.4},
        "sector_proxy": {"engine_call_id": "ec_c9d0e1f2", "label": "Industrials", "daily_return_pct": -1.2},
        "peer_returns": {"engine_call_id": "ec_3a4b5c6d", "peers": [{"ticker": "SAND-B", "return_pct": -1.6}]}
      }

