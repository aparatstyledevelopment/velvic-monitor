# Smoke entry point. Phase 1's briefing_quality and Phase 2's
# citation_discipline + refusal_behavior live in sibling configs invoked by
# `make evals`. Each suite has its own promptfoo.yaml so prompts and
# fixtures stay co-located.
description: "Velvic Monitor LLM eval suite -- smoke"

prompts:
  - file://briefing_quality/prompt.txt

providers:
  - id: anthropic:messages:claude-haiku-4-5-20251001
    config:
      max_tokens: 256

tests:
  - description: "smoke: provider connectivity"
    vars:
      question: "Reply with the single word OK."
    assert:
      - type: contains
        value: "OK"

defaultTest:
  options:
    cache: true
