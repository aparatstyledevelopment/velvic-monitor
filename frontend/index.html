<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Velvic Monitor</title>
    <!--
      Hydrate persisted prefs BEFORE first paint to avoid a theme/size flash.
      Mirrored by src/state/prefs.ts; keep these two in sync.
    -->
    <script>
      (function () {
        try {
          var raw = localStorage.getItem("prefs");
          var prefs = raw ? JSON.parse(raw) : {};
          if (prefs.theme === "dark" || prefs.theme === "light") {
            document.documentElement.dataset.theme = prefs.theme;
          } else {
            document.documentElement.dataset.theme = "light";
          }
          var sizes = { small: "14px", medium: "15px", large: "17px" };
          var size = sizes[prefs.interfaceSize] || sizes.medium;
          document.documentElement.style.fontSize = size;
        } catch (e) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
