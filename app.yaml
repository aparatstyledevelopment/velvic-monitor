name: velvic-monitor
region: fra1

# Cheapest-possible footprint for Phase-1 validation:
# - basic-xxs ($5/mo) on every app component (no autoscaling).
# - Postgres on dev tier (production: false, ~$7/mo).
# - Redis OMITTED. DO doesn't allow inline-provisioned Redis on the dev
#   tier (REDIS must be production), and a production Redis cluster is
#   $15/mo + a separate provisioning step. Phase-1 validation doesn't
#   need it: no Celery beat, no rate limit hot path. The /api/health
#   endpoint tolerates the missing Redis (returns redis: "skipped").
# - Worker component is omitted; Phase-1 validation runs the EOD chain
#   via `doctl apps console web` -> `python -m app.admin.backfill`,
#   which exercises the same code path without needing Celery beat.
# Re-add Redis (`databases:` entry referencing a pre-provisioned cluster
# or a separate redis: block) when Phase 2 chat orchestrator needs rate
# limiting or the worker comes back online.

services:
  - name: web
    source_dir: backend/
    github:
      repo: aparatstyledevelopment/velvic-monitor
      branch: main
      deploy_on_push: true
    # No build_command: Python buildpack auto-runs `pip install -r
    # requirements.txt`, which contains `.` and installs the package
    # plus deps from pyproject.toml. The previous custom build_command
    # used `pip install -e .` which fails on the buildpack's setuptools
    # (PEP 660 editable installs need setuptools >= 64).
    run_command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --workers 1
    instance_size_slug: basic-xxs
    instance_count: 1
    http_port: 8080
    health_check:
      http_path: /api/health
    routes:
      - path: /api
    envs:
      - { key: ENV, value: production }
      - { key: DATABASE_URL, value: "${db.DATABASE_URL}" }
      - { key: JWT_SECRET, type: SECRET }
      - { key: ENCRYPTION_KEY, type: SECRET }
      - { key: ANTHROPIC_API_KEY, type: SECRET }
      - { key: OPENAI_API_KEY, type: SECRET }
      - { key: GOOGLE_API_KEY, type: SECRET }
      - { key: FRED_API_KEY, type: SECRET }
      - { key: POSTMARK_TOKEN, type: SECRET }
      - { key: SENTRY_DSN, type: SECRET }
      - { key: LANGFUSE_PUBLIC_KEY, type: SECRET }
      - { key: LANGFUSE_SECRET_KEY, type: SECRET }

jobs:
  - name: migrate
    kind: PRE_DEPLOY
    source_dir: backend/
    github:
      repo: aparatstyledevelopment/velvic-monitor
      branch: main
    # Same reason as web: buildpack auto-installs from requirements.txt.
    run_command: alembic upgrade head
    instance_size_slug: basic-xxs
    instance_count: 1
    envs:
      - { key: ENV, value: production }
      - { key: DATABASE_URL, value: "${db.DATABASE_URL}" }

static_sites:
  - name: frontend
    source_dir: frontend/
    github:
      repo: aparatstyledevelopment/velvic-monitor
      branch: main
    build_command: npm ci --include=dev && npm run build
    output_dir: dist
    catchall_document: index.html
    # No VITE_API_URL: frontend/src/api/client.ts uses relative `/api/...`
    # URLs (same-origin), and DO routes /api -> web service automatically.
    # The previous `${APP_DOMAIN}` was not a valid bindable variable and
    # caused "Build failed for updating app configuration" on spec update.
    envs:
      # DO's Node buildpack sets NODE_ENV=production, which makes
      # `npm ci` skip devDependencies. Our build needs typescript + vite
      # (both devDeps) -- without this override `npm run build` fails
      # with `tsc: not found`. The `--include=dev` flag on npm ci is a
      # belt-and-suspenders backup for the same thing.
      - { key: NPM_CONFIG_PRODUCTION, value: "false" }

databases:
  - name: db
    engine: PG
    version: "16"
    production: false
