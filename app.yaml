name: velvic-monitor
region: fra1

# Cheapest-possible footprint for Phase-1 validation:
# - basic-xxs ($5/mo) on every app component (no autoscaling).
# - production: false on managed Postgres + Redis to use the dev tiers
#   (single node, no HA, no daily backups beyond 1).
# - Worker component is omitted; Phase-1 validation runs the EOD chain
#   via `doctl apps console web` -> `python -m app.admin.backfill`,
#   which exercises the same code path without needing Celery beat.
# Re-add the `workers:` block when scheduled crawls are needed.

services:
  - name: web
    source_dir: backend/
    github:
      repo: aparatstyledevelopment/velvic-monitor
      branch: main
      deploy_on_push: true
    build_command: |
      pip install --upgrade pip
      pip install -e .
    run_command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --workers 1
    instance_size_slug: basic-xxs
    instance_count: 1
    http_port: 8080
    health_check:
      http_path: /api/health
    routes:
      - path: /api
    envs:
      - { key: ENV, value: production }
      - { key: DATABASE_URL, value: "${db.DATABASE_URL}" }
      - { key: REDIS_URL, value: "${redis.REDIS_URL}" }
      - { key: JWT_SECRET, type: SECRET }
      - { key: ENCRYPTION_KEY, type: SECRET }
      - { key: ANTHROPIC_API_KEY, type: SECRET }
      - { key: OPENAI_API_KEY, type: SECRET }
      - { key: GOOGLE_API_KEY, type: SECRET }
      - { key: FRED_API_KEY, type: SECRET }
      - { key: POSTMARK_TOKEN, type: SECRET }
      - { key: SENTRY_DSN, type: SECRET }
      - { key: LANGFUSE_PUBLIC_KEY, type: SECRET }
      - { key: LANGFUSE_SECRET_KEY, type: SECRET }

jobs:
  - name: migrate
    kind: PRE_DEPLOY
    source_dir: backend/
    github:
      repo: aparatstyledevelopment/velvic-monitor
      branch: main
    build_command: pip install -e .
    run_command: alembic upgrade head
    instance_size_slug: basic-xxs
    instance_count: 1
    envs:
      - { key: ENV, value: production }
      - { key: DATABASE_URL, value: "${db.DATABASE_URL}" }

static_sites:
  - name: frontend
    source_dir: frontend/
    github:
      repo: aparatstyledevelopment/velvic-monitor
      branch: main
    build_command: npm ci && npm run build
    output_dir: dist
    catchall_document: index.html
    envs:
      - { key: VITE_API_URL, value: "https://${APP_DOMAIN}" }

databases:
  - name: db
    engine: PG
    version: "16"
    production: false
  - name: redis
    engine: REDIS
    version: "7"
    production: true
    cluster_name: velvic-redis
    size: db-s-1vcpu-1gb
