name: velvic-monitor
region: fra1

services:
  - name: web
    source_dir: backend/
    github:
      repo: aparatstyledevelopment/velvic-monitor
      branch: main
      deploy_on_push: true
    build_command: |
      pip install --upgrade pip
      pip install -e .
    run_command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --workers 2
    pre_deploy_command: alembic upgrade head
    instance_size_slug: basic-xs
    instance_count: 1
    autoscaling:
      min_instance_count: 1
      max_instance_count: 3
      metrics:
        cpu:
          percent: 70
    http_port: 8080
    health_check:
      http_path: /api/health
    routes:
      - path: /api
    envs:
      - { key: ENV, value: production }
      - { key: DATABASE_URL, value: ${db.DATABASE_URL} }
      - { key: REDIS_URL, value: ${redis.REDIS_URL} }
      - { key: JWT_SECRET, type: SECRET }
      - { key: ENCRYPTION_KEY, type: SECRET }
      - { key: ANTHROPIC_API_KEY, type: SECRET }
      - { key: OPENAI_API_KEY, type: SECRET }
      - { key: GOOGLE_API_KEY, type: SECRET }
      - { key: FRED_API_KEY, type: SECRET }
      - { key: POSTMARK_TOKEN, type: SECRET }
      - { key: SENTRY_DSN, type: SECRET }
      - { key: LANGFUSE_PUBLIC_KEY, type: SECRET }
      - { key: LANGFUSE_SECRET_KEY, type: SECRET }

workers:
  - name: worker
    source_dir: backend/
    github:
      repo: aparatstyledevelopment/velvic-monitor
      branch: main
    build_command: pip install -e .
    run_command: celery -A app.pipeline.celery_app worker --beat --loglevel=info --concurrency=4
    instance_size_slug: basic-xs
    instance_count: 1
    envs:
      - { key: ENV, value: production }
      - { key: DATABASE_URL, value: ${db.DATABASE_URL} }
      - { key: REDIS_URL, value: ${redis.REDIS_URL} }
      - { key: ANTHROPIC_API_KEY, type: SECRET }
      - { key: OPENAI_API_KEY, type: SECRET }
      - { key: GOOGLE_API_KEY, type: SECRET }
      - { key: FRED_API_KEY, type: SECRET }
      - { key: SENTRY_DSN, type: SECRET }
      - { key: LANGFUSE_PUBLIC_KEY, type: SECRET }
      - { key: LANGFUSE_SECRET_KEY, type: SECRET }

static_sites:
  - name: frontend
    source_dir: frontend/
    github:
      repo: aparatstyledevelopment/velvic-monitor
      branch: main
    build_command: npm ci && npm run build
    output_dir: dist
    catchall_document: index.html
    envs:
      - { key: VITE_API_URL, value: https://${APP_DOMAIN} }

databases:
  - name: db
    engine: PG
    version: "16"
    production: true
    size: db-s-1vcpu-1gb
  - name: redis
    engine: REDIS
    version: "7"
    production: true
    size: db-s-1vcpu-1gb
